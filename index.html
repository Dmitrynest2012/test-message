<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Посылы</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="message_love.ico">

    

    
 
</head>
<body>

    <div id="flame-container">
        <video id="flame-video" loop muted>
            <source src="flame_mini.mp4" type="video/mp4">
            <source src="flame_mini.webm" type="video/webm">
            <source src="flame_mini.ogv" type="video/ogg">
            <source src="flame_mini.wmv" type="video/x-ms-wmv">
            <source src="flame_mini.avi" type="video/x-msvideo">
            <source src="flame_mini.mov" type="video/quicktime">
            Ваш браузер не поддерживает видео.
        </video>
    </div>
    
    <div id="control-container" class="control-container">
        <button id="music-toggle" class="music-toggle">🔊</button>
        <button id="settings-toggle" class="settings-toggle">☰</button>
    </div>
    
    <div id="image-container" class="image-container">
        <img id="dynamic-image" src="" alt="Dynamic Image">
        <div id="song-title" class="song-title"></div>
        <div id="notification-container" class="notification-container">
            <span class="notification-icon">⟳</span>
            <span id="notification-text" class="notification-text"></span>
        </div>
        <div id="quatrain-container" class="quatrain-container">
            <h3 id="quatrain-title" class="quatrain-title"></h3>
            <span id="quatrain-date" class="quatrain-date"></span>
            <div id="quatrain-text" class="quatrain-text"></div>
            <div id="quatrain-transition" class="quatrain-transition"></div>
        </div>
    </div>
    <div class="clock-container">
        <div id="date">Загрузка...</div>
        <div id="clock">Загрузка...</div>
        <h1>точное московское время</h1>
        <div class="progress-line"></div>
    </div>
    <div id="message-text" class="message-container">
        <p>Здесь будет ваш текст посыла</p>
    </div>
    
    <div id="settings-popup" class="settings-popup">
        <div class="settings-section">
            <div class="section-header">
                <span class="section-title">Ссылки на основные ресурсы</span>
                <span class="section-toggle">▼</span>
            </div>
            <div class="section-content">
                <div class="resource-links">
                    <a href="https://blagayavest.info/" class="resource-button" target="_blank">Благая Весть</a>
                    <a href="https://akegn.ru/" class="resource-button" target="_blank">Академия</a>
                    <a href="https://doktrina.info/?yclid=3755516742685425663" class="resource-button" target="_blank">Доктрина</a>
                    <a href="https://doktrina8.ru/mir.html" class="resource-button" target="_blank">Заказ Книг</a>
                    <a href="https://xn--c1akeeelbbx.xn--p1ai/" class="resource-button" target="_blank">КОСМ «Новое Поколение»</a>
                </div>
            </div>
        </div>

        <div class="settings-section">
            <div class="section-header">
                <span class="section-title">Заповеди Движения Творца</span>
                <span class="section-toggle">▼</span>
            </div>
            <div class="section-content">
                <div class="commandments-text">
                </div>
            </div>
        </div>

        <div class="settings-section">
            <div class="section-header">
                <span class="section-title">Настройки</span>
                <span class="section-toggle">▼</span>
            </div>
            <div class="section-content">
                <!-- Новая настройка "Полноэкранный режим" -->
                <div class="setting-item">
                    <label for="fullscreen-toggle">Полноэкранный режим:</label>
                    <input type="checkbox" id="fullscreen-toggle">
                </div>
                <!-- Существующие настройки -->
                <div class="setting-item">
                    <label for="outside-volume">Громкость музыки вне Посыла:</label>
                    <input type="range" id="outside-volume" min="0" max="1" step="0.01">
                </div>
                <div class="setting-item">
                    <label for="posyl-volume">Громкость музыки во время Посыла:</label>
                    <input type="range" id="posyl-volume" min="0" max="1" step="0.01">
                </div>
                <div class="setting-item">
                    <label for="bell-toggle">Использовать звук колокола:</label>
                    <input type="checkbox" id="bell-toggle">
                </div>
                <div class="setting-item">
                    <label for="bell-volume">Громкость колокола:</label>
                    <input type="range" id="bell-volume" min="0" max="1" step="0.01" disabled>
                </div>
                <div class="setting-item">
                    <label for="interval-end-volume">Громкость уведомления [за 17 секунд до завершения 5-ти минутки]:</label>
                    <input type="range" id="interval-end-volume" min="0" max="1" step="0.01">
                </div>
                <div class="setting-item">
                    <label for="flame-in-posyl">Показывать свечу в Посыле:</label>
                    <input type="checkbox" id="flame-in-posyl">
                </div>
                <div class="setting-item">
                    <label for="flame-outside-posyl">Показывать свечу вне Посыла:</label>
                    <input type="checkbox" id="flame-outside-posyl">
                </div>
                <div class="setting-item">
                    <label for="desktop-font-size">Размер шрифта Посыла на компьютере:</label>
                    <div class="font-size-control">
                        <button class="font-size-decrease" data-target="desktop-font-size">◀</button>
                        <input type="number" id="desktop-font-size" min="16" max="30" step="1">
                        <button class="font-size-increase" data-target="desktop-font-size">▶</button>
                    </div>
                </div>
                <div class="setting-item">
                    <label for="mobile-font-size">Размер шрифта Посыла на смартфоне:</label>
                    <div class="font-size-control">
                        <button class="font-size-decrease" data-target="mobile-font-size">◀</button>
                        <input type="number" id="mobile-font-size" min="10" max="20" step="1">
                        <button class="font-size-increase" data-target="mobile-font-size">▶</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="xlsx.full.min.js"></script>
    <script src="time.js"></script>
    <script src="data.js"></script>
    <script src="settings.js"></script>
    <script src="script.js"></script>

</body>
</html>
